 class="tooltiptext neutral_glow">        Sesílatel zrychlí plynutí času pro cílové organismy a objekty, ty se tak ostatním budou zdát pomalejší.    </span></span>'}],"dlouhodobe zrychleni":[{tags:["dohled","zrychleni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zrychlení">    <span class="spell_text" tabindex="0">        Dlouhodobé Zrychlení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐇    <span class="icon-tooltip-text">        Zrychlení    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel za enormní cenu energie sešle na cílový organismus, objekt nebo proces urychlující kouzlo, které uvolňuje energii postupně a po dlouhou dobu kolem cíle lehce zpomaluje tok času, čímž se cíl ostatním zdá být rychlejší. Doba trvání a rozsah efektu záleží na schopnostech sesílatele, typicky je to malý, ale znatelný efekt po dobu několika dní.    </span></span>'}],"dlouhodobe zpomaleni":[{tags:["dohled","zpomaleni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zpomalení">    <span class="spell_text" tabindex="0">        Dlouhodobé Zpomalení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐢    <span class="icon-tooltip-text">        Zpomalení    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel za enormní cenu energie sešle na cílový organismus, objekt nebo proces zpomalující kouzlo, které uvolňuje energii postupně a po dlouhou dobu kolem cíle lehce zrychluje tok času, čímž se cíl ostatním zdá být pomalejší. Doba trvání a rozsah efektu záleží na schopnostech sesílatele, typicky je to malý, ale znatelný efekt po dobu několika dní.    </span></span>'}],"prodlouzeni kouzla":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Prodloužení Kouzla    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel vloží do kouzla, které sám seslal, a které stále trvá, energii, kterou může prodloužit trvání tohoto kouzla. Projevuje se podobně, jako by do tohoto kouzla vložil více energie, když ho poprvé sesílal, ovšem tato energie navíc se projeví až v moment prodloužení kouzla.    </span></span>'}],"dlouhodobe mladnuti":[{tags:["dohled","omladnuti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,omládnutí">    <span class="spell_text" tabindex="0">        Dlouhodobé Mládnutí    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    👶    <span class="icon-tooltip-text">        Omládnutí    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel za enormní cenu energie sešle na cílový organismus nebo objekt omlazující kouzlo, které postupně pomalu uvádí cíl do stavy, v jakém byl v sesílatelem zvolené minulosti. Větší omládnutí vyžaduje dramaticky více energie. Doba trvání závisí na schopnostech sesílatele, řádově týdny až měsíce.    </span></span>'}],"dlouhodobe starnuti":[{tags:["dohled","zestarnuti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zestárnutí">    <span class="spell_text" tabindex="0">        Dlouhodobé Stárnutí    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    👴    <span class="icon-tooltip-text">        Zestárnutí    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel za enormní cenu energie sešle na cílový organismus nebo objekt postaršující kouzlo, které postupně pomalu uvádí cíl do stavy, v jakém bude v sesílatelem zvolené budoucnosti. Větší zestárnutí vyžaduje dramaticky více energie. Doba trvání závisí na schopnostech sesílatele, řádově týdny až měsíce.    </span></span>'}],"nahled do davne minulosti mista":[{tags:["nahlizeni","informace"],html:'<span data-html="true" class="tooltip " data-tags="nahlížení,informace">    <span class="spell_text" tabindex="0">        Náhled do Dávné Minulosti Místa    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🔮    <span class="icon-tooltip-text">        Nahlížení    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel vidí vizi, v níž nahlíží na to, co se na daném místě dělo v minulosti vztažené k sesílatelem zvolené události. Vzhledem k tomu, že vize není řízena časem, ale událostí, lze takto nahlížet do dávné minulosti, což by jinak vyžadovalo nereálné množství energie. Čím přesnější je sesílatelova představa o dané události, tím méně je kouzlo energeticky náročné.    </span></span>'}],"nahled do davne minulosti objektu/organismu":[{tags:["nahlizeni","informace"],html:'<span data-html="true" class="tooltip " data-tags="nahlížení,informace">    <span class="spell_text" tabindex="0">        Náhled do Dávné Minulosti Objektu/Organismu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🔮    <span class="icon-tooltip-text">        Nahlížení    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel vidí vizi, v níž nahlíží na to, co se s jeho cílem dělo v minulosti vztažené k sesílatelem zvolené události. Vzhledem k tomu, že vize není řízena časem, ale událostí, lze takto nahlížet do dávné minulosti, což by jinak vyžadovalo nereálné množství energie. Čím přesnější je sesílatelova představa o dané události, tím méně je kouzlo energeticky náročné.    </span></span>'}],"zastaveni mista v case":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Zastavení Místa v Čase    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel pro všechny objekty, organismy a procesy na daném místě na krátkou chvíli zastaví plynutí času. Vše zamrzne na místě, nemůže být nijak poškozeno a ani většina jiných interakcí na cíle nebude mít efekt. Po skončení vše pokračuje v pohybech a procesech, jaké byly tímto kouzlem přerušeny.    </span></span>'}],"presunuti kouzla v case":[{tags:["dohled","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,teleportace">    <span class="spell_text" tabindex="0">        Přesunutí Kouzla v Čase    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel donutí cílové kouzlo v okamžik jeho seslání udělat skok časem dopředu. Cílové kouzlo po dobu trvání kouzla přestane existovat a objeví se znovu po uplynutí kouzla. Poté bude sesláno v původně zamýšleném rozsahu. Jelikož energie byla do cílového kouzla již vložena, není potřeba jakoukoliv další dodávat. Pro účely ostatní magie a kontramagie je seslání podobné, jako by kouzlo bylo sesláno skrz <strong>Značku času</strong> Lze použít na svoje i cizí kouzla.    </span></span>'}],"zmena frekvence vlneni":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Změna Frekvence Vlnění    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel sníží nebo zvýší frekvenci fyzického vlnění (hlas, vlny ve vodě apod.    </span></span>'}],levitace:[{tags:["sesilatel"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel">    <span class="spell_text" tabindex="0">        Levitace    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel po dobu udržování kouzla zakřivuje prostor tak, že se vznese do vzduchu a je schopen se rychlostí kroku ve vzduchu i pohybovat.    </span></span>'}],"levitace - predmet":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Levitace - Předmět    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel po dobu udržování kouzla zakřivuje prostor kolem předmětu, který vidí, tak, že se tento předmět vznese do vzduchu a sesílatel je schopen jím rychlostí kroku ve vzduchu i pohybovat.    </span></span>'}],"teleportace objektu":[{tags:["dotyk","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,teleportace">    <span class="spell_text" tabindex="0">        Teleportace Objektu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel se dotkne teleportovaného objektu a okamžitě ho přesune na místo, které vidí.<br><br>Na místě, ze kterého cíl zmizí, dojde k malé implozi doprovázené zvukem hromu. Síla tohoto efektu závisí na velikosti cíle.<br><br>Na místě, ve kterém se cíl objeví, dojde k odtlačení všeho, co tam bylo, aby vznikl prostor pro cíl.    </span></span>'}],"privolani objektu":[{tags:["dohled","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,teleportace">    <span class="spell_text" tabindex="0">        Přivolání Objektu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel okamžitě přesune objekt, který vidí, ke své ruce.<br><br>Na místě, ze kterého cíl zmizí, dojde k malé implozi doprovázené zvukem hromu. Síla tohoto efektu závisí na velikosti cíle.<br><br>Na místě, ve kterém se cíl objeví, dojde k odtlačení všeho, co tam bylo, aby vznikl prostor pro cíl.    </span></span>'}],"neprostupna bariera":[{tags:["dohled","bariera"],html:'<span data-html="true" class="tooltip " data-tags="dohled,bariéra">    <span class="spell_text" tabindex="0">        Neprostupná Bariéra    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧱    <span class="icon-tooltip-text">        Bariéra    </span></span>    </span>    <span class="tooltiptext barrier_glow">        Sesílatel vytvoří neviditelnou neprostupnou zeď, která absorbuje nárazy předmětů. Každý náraz odčerpává energii kouzla. <br><br>Pokud kouzlo trvá delší dobu, začne z něj malá část energie mizet i samovolně. <br><br>Velikost bariéry závisí na schopnostech sesílatele, s on_glow">        Sesílatel po dobu udržování kouzla ohýbá prostor mezi 2 místy, která obě vidí, tak, že se od sebe obě místa oddálí. <br><br>Lze například rozšířit dveře, aby jimi sesílatel mohl pronést velký předmět apod.    </span></span>'}],"zmena drahy objektu":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Změna Dráhy Objektu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel po dobu udržování kouzla zakřivuje prostor kolem pohybujícího se objektu tak, že dokáže měnit jeho směr.    </span></span>'}],"pritahujici pole":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Přitahující Pole    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel vytvoří pole prostoru zakřiveného k centrálnímu bodu. Všechny objekty v poli jsou přitahovány k tomuto středu. <br><br>Čím blíže je objekt ke středu, tím silněji je přitahován. Pole časem ztrácí na intenzitě.    </span></span>'}],"odpuzujici pole":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Odpuzující Pole    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel vytvoří pole prostoru zakřiveného od centrálního bodu. Všechny objekty v poli jsou odpuzovány od tohoto středu. <br><br>Čím blíže je objekt ke středu, tím silněji je odpuzován. Pole časem ztrácí na intenzitě.    </span></span>'}],pritazeni:[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Přitažení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel vytvoří silné zakřivení prostoru mezi sebou a cílem, které vzápětí nechá narovnat, což vytvoří impulz síly, který cíl přitáhne k sesílateli.    </span></span>'}],odhozeni:[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Odhození    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel vytvoří silné zakřivení prostoru ze svého pohledu za cílem, které vzápětí nechá narovnat, což vytvoří impulz síly, který cíl odhodí od sesílatele.    </span></span>'}],srazeni:[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Sražení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel vytvoří silné zakřivení prostoru pod cílem, které vzápětí nechá narovnat, což vytvoří impulz síly, který cíl srazí k zemi.    </span></span>'}],"prostorova trhlina":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Prostorová Trhlina    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        V homogenním materiálu vytvoří trhlinu. <br><br>Sesílatel může např. nechat prasknout sklo.    </span></span>'}],"zaceleni trhliny":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Zacelení Trhliny    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        V homogenním materiálu zacelí trhlinu. <br><br>Sesílatel může např. zacelit prasklinu ve skle.    </span></span>'}],"teleportace sebe":[{tags:["sesilatel","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,teleportace">    <span class="spell_text" tabindex="0">        Teleportace Sebe    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel se okamžitě přesune na místo, které vidí.<br><br>Na místě, ze kterého sesílatel zmizí, dojde k malé implozi doprovázené zvukem hromu. Síla tohoto efektu závisí na velikosti sesílatele.<br><br>Na místě, ve kterém se sesílatel objeví, dojde k odtlačení všeho, co tam bylo, aby vznikl prostor pro sesílatele.    </span></span>'}],"teleportace organismu":[{tags:["dotyk","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,teleportace">    <span class="spell_text" tabindex="0">        Teleportace Organismu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel se dotkne teleportovaného živého cíle a okamžitě ho přesune na místo, které vidí.<br><br>Na místě, ze kterého cíl zmizí, dojde k malé implozi doprovázené zvukem hromu. Síla tohoto efektu závisí na velikosti cíle.<br><br>Na místě, ve kterém se cíl objeví, dojde k odtlačení všeho, co tam bylo, aby vznikl prostor pro cíl.    </span></span>'}],"privolani organismu":[{tags:["dohled","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,teleportace">    <span class="spell_text" tabindex="0">        Přivolání Organismu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel okamžitě přesune živý cíl, který vidí, ke své ruce.<br><br>Na místě, ze kterého cíl zmizí, dojde k malé implozi doprovázené zvukem hromu. Síla tohoto efektu závisí na velikosti cíle.<br><br>Na místě, ve kterém se cíl objeví, dojde k odtlačení všeho, co tam bylo, aby vznikl prostor pro cíl.    </span></span>'}],"bariera propoustejici zvuk":[{tags:["dohled","bariera"],html:'<span data-html="true" class="tooltip " data-tags="dohled,bariéra">    <span class="spell_text" tabindex="0">        Bariéra Propouštějící Zvuk    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧱    <span class="icon-tooltip-text">        Bariéra    </span></sp tooltiptext distortion_glow">        Zakřivuje prostor kolem sesílatele tak, že na věci kolem něj působí konstantní síla směrem od sesílatele.    </span></span>'}],"odvraceni utoku":[{tags:["sesilatel","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,zakřivení">    <span class="spell_text" tabindex="0">        Odvrácení Útoků    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Zakřivuje prostor kolem sesílatele tak, aby ho cokoliv pohybující se směrem k němu obtékalo. <br><br>Např. šípy, které by ho měly zasáhnout, ho minou a pokračují ve své trajektorii za ním.    </span></span>'}],"zvetseni objektu":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Zvětšení Objektu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel po dobu udržování kouzla zvětšuje cílový objekt. <br><br>Zvětšování je ve všech směrech stejné, a cílový objekt si ponechá svou hmotnost - v důsledku čehož může být křehčí.    </span></span>'}],"zmenseni objektu":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Zmenšení Objektu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel po dobu udržování kouzla zmenšuje cílový objekt. <br><br>Zmenšování je ve všech směrech stejné, a cílový objekt si ponechá svou hmotnost - v důsledku čehož může být tvrdší.    </span></span>'}],"prostorovy tunel":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Prostorový Tunel    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel vytvoří malou červí díru, kterou může projít skrz malé překážky - např. projít stěnou.    </span></span>'}],"narovnani prostoru":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Narovnání Prostoru    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel v cílové oblasti odstraní všechny efekty kouzel zakřivujících prostor.<br><br>Dokud tomuto kouzlu sesílatel věnuje plnou pozornost, brání ostatním mágům prostoru v zakřivování cílové oblasti.<br><br>V takovém případě dochází k souboji vůle mezi sesílatelem a druhým mágem.    </span></span>'}],"cit prostoru":[{tags:["sesilatel","informace"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,informace">    <span class="spell_text" tabindex="0">        Cit Prostoru    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Po dobu udržování kouzla získává sesílatel magický smysl, kterým dokáže prohledat prostor kolem sebe a zjistit, co se kde kolem něj nachází.    </span></span>'}],"teleportacni brana":[{tags:["dohled","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,teleportace">    <span class="spell_text" tabindex="0">        Teleportační Brána    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Vytvoří portál mezi 2 místy, která sesílatel vidí. <br><br>Jakýkoliv objekt, který projde portálem na jedné straně se objeví na druhé straně se stejnou rychlostí a směrem, s jakými portálem prošel.    </span></span>'},{tags:["pamet","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="paměť,teleportace">    <span class="spell_text" tabindex="0">        Teleportační Brána    </span>    <span class="spell_icons">        <span class="icon-tooltip">    💭    <span class="icon-tooltip-text">        Paměť    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel vytvoří portál mezi 2 místy, která vidí nebo si je dobře pamatuje. Jakýkoliv objekt projde portálem na jedné straně se objeví na druhé straně se stejnou rychlostí a směrem, s jakými portálem prošel. Lokace portálu na obou stranách je tím přesnější, čím lepší je sesílatelova vzpomínka na cílové místo. Při teleportaci na místo, které sesílatel nevidí, hrozí kolize s jiným objektem, s nepředvídatelnými destruktivními efekty.    </span></span>'}],"barierove vezeni":[{tags:["dohled","bariera"],html:'<span data-html="true" class="tooltip " data-tags="dohled,bariéra">    <span class="spell_text" tabindex="0">        Bariérové Vězení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧱    <span class="icon-tooltip-text">        Bariéra    </span></span>    </span>    <span class="tooltiptext barrier_glow">        Sesílatel kolem cíle vytvoří bariéru, jejíž tvar kopíruje tvar cíle, a zcela mu tak znemožní se hýbat.    </span></span>'}],"jednosmerna bariera":[{tags:["dohled","bariera"],html:'<span data-html="true" class="tooltip " data-tags="dohled,bariéra">    <span class="spell_text" tabindex="0">        Jednosměrná Bariéra    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧱    <span class="icon-tooltip-text">        Bariéra    </span></span>    </span>    <span class="tooltiptext barrier_glow">        Vytvoří bariéru podobnou kouzlu neprostupná bariéra, která ovšem brání objektům v pohybu pouze jedním směrem.<br><br>Pokud objekt nebo organismus prochází z průchozí strany, může se vrátit, dokud se celý neocitne za bariérou a bariéra se pro něj bude chovat elasticky.    </span></span>'}],"zvetseni organismu":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Zvětšení Organismu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel po dobu udržování kouzla zvětšuje cílový organismus. <br><br>Zvětšování je ve všech směrech stejné, a cíl si ponechá svou hmotnost - v důsledku čehož může být zranitelnější.    </span></span>'}],"zmenseni organismu":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Zmenšení Organismu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel po dobu udržování kouzla zmenšuje cílový objekt. <br><br>Zmenšování je ve všech směrech stejné, a cílový objekt si ponechá svou hmotnost - v důsledku čehož může být tvrdší    </span></span>'}],"zmena tvaru organismu":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Změna Tvaru Organismu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel po dobu udržování kouzla mění tvar cílového organismu, kterého se dotýká. <br><br>Po skončení kouzla se organismus opět vrátí do tvaru, který měl původně.    </span></span>'}],"hromadne pritazeni":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Hromadné Přitažení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel sešle <strong>Přitažení</strong> na několik cílů najednou. <br><br>Náročnost je úměrná počtu cílů.    </span></span>'}],"hromadne odhozeni":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Hromadné Odhození    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel sešle <strong>Odhození</strong> na několik cílů najednou. <br><br>Náročnost je úměrná počtu cílů.    </span></span>'}],"hromadne srazeni":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Hromadné Sražení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel sešle <strong>Sražení</strong> na několik cílů najednou. <br><br>Náročnost je úměrná počtu cílů.    </span></span>'}],"znacka prostoru":[{tags:["soustredeni"],html:'<span data-html="true" class="tooltip " data-tags="soustředění">    <span class="spell_text" tabindex="0">        Značka Prostoru    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel provede na cíli rituál, kterým si ho označí tak, aby na něj nadále byl schopen sesílat kouzla, jako by se ho dotýkal, ať je cíl kdekoliv.<br><br><strong>Značka prostoru</strong> trvá věčně, ale sesílatel současně může mít pouze tolik značek, kolik si dokáže okamžitě kdykoliv vybavit, v případě zapomnění značka zaniká.<br><br>Vyžaduje sesílatelovu plnou koncentraci.    </span></span>'}],teleportace:[{tags:["dotyk","pamet","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,paměť,teleportace">    <span class="spell_text" tabindex="0">        Teleportace    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    💭    <span class="icon-tooltip-text">        Paměť    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel teleportuje sebe, cílový objekt nebo organismus, na místo, které si dobře pamatuje. Teleportace je tím přesnější, čím lepší je sesílatelova vzpomínka na cílové místo. Při teleportaci na místo, které sesílatel nevidí, hrozí kolize s jiným objektem, s nepředvídatelnými destruktivními efekty.    </span></span>'}],privolani:[{tags:["pamet","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="paměť,teleportace">    <span class="spell_text" tabindex="0">        Přivolání    </span>    <span class="spell_icons">        <span class="icon-tooltip">    💭    <span class="icon-tooltip-text">        Paměť    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel přivolá objekt nebo organismus z místa, které si dobře pamatuje. Přivolání je tím přesnější, čím lepší je sesílatelova vzpomínka na cílové místo. Při přivolávání z místa, které sesílatel nevidí, hrozí přivolání jiného cíle nebo nepřesné přivolání s nepředvídatelnými destruktivními efekty.    </span></span>'}],"hromadna teleportace":[{tags:["dotyk","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,teleportace">    <span class="spell_text" tabindex="0">        Hromadná Teleportace    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel se dotkne více teleportovaných cílů a okamžitě je přesune na místo, které vidí. Sesílatel musí být schopen teleportovat každý cíl zvlášť (pokud tedy alespoň jeden cíl je organismus, sesílatel musí znát kouzlo <strong>Teleportace organismu</strong>). Při přivolávání většího množství objemnějších cílů může dojít na cílovém místě ke kolizím s drobnými destruktivními efekty.    </span></span>'}],"hromadne privolani":[{tags:["dohled","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,teleportace">    <span class="spell_text" tabindex="0">        Hromadné Přivolání    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel okamžitě přesune více cílů, které vidí, ke své ruce. Sesílatel musí být schopen přivolat každý cíl zvlášť (pokud tedy alespoň jeden cíl je organismus, sesílatel musí znát kouzlo <strong>Přivolání organismu</strong> apod.). Při přivolávání většího množství objemnějších cílů může dojít u sesílatele ke kolizím s drobnými destruktivními efekty.    </span></span>'}],"dlouhodoba teleportacni brana":[{tags:["dohled","teleportace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,teleportace">    <span class="spell_text" tabindex="0">        Dlouhodobá Teleportační Brána    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Teleportace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Za cenu enormního množství energie sešle kouzlo <strong>Teleportační brána</strong>, které portál mezi 2 místy otevře na dlouhou dobu. Doba trvání závisí na schopnostech sesílatele, řádově dny až týdny.    </span></span>'}],"pohybliva bariera":[{tags:["dohled","bariera","soustredeni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,bariéra,soustředění">    <span class="spell_text" tabindex="0">        Pohyblivá Bariéra    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧱    <span class="icon-tooltip-text">        Bariéra    </span></span> <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span>    </span>    <span class="tooltiptext barrier_glow">        Sesílatel sešle bariérové kouzlo, ovšem s tím, že vytvořenou bariérou může silou vůle pohybovat. Po dobu hýbání bariéry vyžaduje sesílatelovu plnou pozornost.     </span></span>'}],"barierova zbroj":[{tags:["sesilatel","bariera"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,bariéra">    <span class="spell_text" tabindex="0">        Bariérová Zbroj    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🧱    <span class="icon-tooltip-text">        Bariéra    </span></span>    </span>    <span class="tooltiptext barrier_glow">        Vytvoří kolem sesílatele bariéru danou jím zvoleným bariérovým kouzlem, která kopíruje jeho tělo a pohybuje se s ním. V případě, že se sesílatel teleportuje z bariéry pryč, se bariéra okamžitě rozpadne.    </span></span>'}],"dlouhodoba bariera":[{tags:["dohled","bariera"],html:'<span data-html="true" class="tooltip " data-tags="dohled,bariéra">    <span class="spell_text" tabindex="0">        Dlouhodobá Bariéra    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧱    <span class="icon-tooltip-text">        Bariéra    </span></span>    </span>    <span class="tooltiptext barrier_glow">        Za cenu enormního množství energie sešle jiné bariérové kouzlo, které bude vyprchávat velmi pomalu. Doba trvání závisí na schopnostech sesílatele, řádově týdny.    </span></span>'}],"barierova kontrukce":[{tags:["dohled","bariera"],html:'<span data-html="true" class="tooltip " data-tags="dohled,bariéra">    <span class="spell_text" tabindex="0">        Bariérová Kontrukce    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧱    <span class="icon-tooltip-text">        Bariéra    </span></span>    </span>    <span class="tooltiptext barrier_glow">        Sesílatel vytvoří konstrukci z propojených bariér, které všechny vznikají a zanikají zároveň. Bariéry nemusí být propojené fyzicky, lze tedy stejně dobře vyrobit kvádr z bariér jako vyrobit 6 bariér, které se nijak nedotýkají. Množství bariér, které je sesílatel schopen seslat najednou a propojit, je závislé na schopnostech sesílatele, standardně 7. Energetická náročnost je úměrná počtu bariér. K rozbití konstrukce stačí rozbít jednu libovolnou bariéru, ovšem je potřeba vyčerpat energii vloženou do celého kouzla. Každá dílčí bariéra může mít jiné vlastnosti, pokud je sesílatel umí (sesílatel tak může vytvořit několik <strong>Sférických bariér</strong> a několik <strong>Bariér propouštějících zvuk</strong>).    </span></span>'}],"kapesni dimenze":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Kapesní Dimenze    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Sesílatel zakřiví prostor kolem cíle tak, že pro ostatní cíl prostě zmizí. Dá se použít také tak, že na určitém místě vytvoří zvenku nepřístupnou bublinu odděleného prostoru.    </span></span>'}],"dlouhodobe zakriveni prostoru":[{tags:["dohled","zakriveni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,zakřivení">    <span class="spell_text" tabindex="0">        Dlouhodobé Zakřivení Prostoru    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    𖣐    <span class="icon-tooltip-text">        Zakřivení    </span></span>    </span>    <span class="tooltiptext distortion_glow">        Za cenu enormního množství energie sešle jiné kouzlo zakřivující prostor, které bude vyprchávat velmi pomalu. Doba trvání závisí na schopnostech sesílatele, řádově hodiny až dny.    </span></span>'}],"zmena amplitudy vlneni":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Změna Amplitudy Vlnění    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel zesílí nebo zeslabí fyzické vlnění (hlas, vlny ve vodě apod.)    </span></span>'}],"pozehnani rychlosti":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Rychlosti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel zvýší fyzickou rychlost pohybu cíle kouzla. <br><br>Doba trvání požehnání přibližně jedna pronásledovací sekvence. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"pozehnani sily":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Síly    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel zvýší fyzickou sílu cíle kouzla. <br><br>Doba trvání požehnání přibližně jedna potyčka, boj. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"pozehnani zraku":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Zraku    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel posílí přirozenou schopnost cíle vidět. <br><br>Zlepšení zraku především v šeru a horších optických podmínkách. Zlepšuje rozeznávání objektů na dálku. <br><br>Doba trvání požehnání podle situace. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"pozehnani sluchu":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Sluchu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel posílí přirozenou schopnost cíle slyšet. <br><br>Schopnost vnímat tišší zvuky, lépe lokalizovat zdroj zvuku, lépe porozumět tiché řeči například při odposlechu. <br><br>Doba trvání požehnání podle situace. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"pozehnani pritazlivosti":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Přitažlivosti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel posílí přirozenou fyzickou atraktivitu cíle. <br><br>Vhodné v situacích jako je svádění či odlákání pozornosti. <br><br>Doba trvání požehnání podle situace. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"pozehnani vydrze":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Výdrže    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel zvýší fyzickou vytrvalost cíle. <br><br>Umožňuje déle vykonávat náročné aktivity jako například běh, boj či sesílání kouzel. <br><br>Doba trvání požehnání podle situace. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"pozehnani zrucnosti":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Zručnosti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel zlepší schopnost cíle koordinovat své pohyby. <br><br>Pomáhá v situacích jako je akrobacie, rovnováha, šplh, úskoky a vrhání. <br><br>Doba trvání požehnání přibližně jedna potyčka, boj. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"pozehnani nezivemu":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Neživému    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel sešle jiné požehnání, které zná, cílené na neživého. Bez tohoto kouzla není možné neživého požehnat a toto kouzlo samo o sobě požehnat nedokáže. <br><br>Vhodná požehnání jsou síla, rychlost a obratnost. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"zaceleni ran":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Zacelení Ran    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel zacelí oděrky a rány na těle, spojí tkáň poškozené kůže, zastaví vlásečnicová krvácení. <br><br>Toto kouzlo nedokáže obnovit větší poškození kůže, svalu, orgánu či kosti. <br><br>Nedokáže zastavit masivní krvácení, k tomu je potřeba nejdříve seslat <strong>Zastavení krvácení</strong>.    </span></span>'}],"zastaveni krvaceni":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Zastavení Krvácení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel zastaví krvácení jakéhokoliv rozsahu, rozsah krvácení určuje náročnost kouzla. <br><br>Toto kouzlo nedokáže obnovit velká poškození či ztráty cév viz <strong>Obnova orgánu</strong>.    </span></span>'}],"srust kosti":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Srůst Kosti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel propojí dvě či více rozlomené části kosti. <br><br>U otevřených či tříštivých zlomenin nemusí být úlomky správně narovnané, to je třeba udělat fyzicky nebo lépe pomocí kouzla <strong>Narovnej kost.</strong> <br><br>Toto kouzlo nedokáže nahradit chybějící části kostí, s čímž pomůže kouzlo <strong>Obnovit kost</strong>.    </span></span>'}],"odhal jed":[{tags:["dohled","informace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,informace">    <span class="spell_text" tabindex="0">        Odhal Jed    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel odhalí přítomnost a druh jedu v těle, ať už živém, či mrtvém. <br><br>Delší dobu po smrti nemusí být jed odhalitelný.    </span></span>'}],"odhal nemoc":[{tags:["dohled","informace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,informace">    <span class="spell_text" tabindex="0">        Odhal Nemoc    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Odhal přítomnost a druh nemoci v těle ať už živém či mrtvém. <br><br>Mezi nemoci spadají například zažívací potíže, chřipka, angína. <br><br>Delší dobu po smrti již nemusí být nemoc odhalitelná.    </span></span>'}],"odhal infekci":[{tags:["dohled","informace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,informace">    <span class="spell_text" tabindex="0">        Odhal Infekci    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel odhalí přítomnost a rozsah infekce či sepse v těle ať už živém či mrtvém. <br><br>Delší dobu po smrti již nemusí být infekce odhalitelná.    </span></span>'}],"stvoreni/povolani maleho neziveho":[{tags:["nezivy"],html:'<span data-html="true" class="tooltip " data-tags="neživý">    <span class="spell_text" tabindex="0">        Stvoření/Povolání Malého Neživého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel vytvoří neživého do velikosti loutky pomocí <strong>Stvoření malého neživého</strong>. <br><br>Neživý může být z materiálů dřevo, hlína, kámen nebo kov. Musí mít fyzickou podobnost s živým organismem (například brouk, loutka, pták, krysa). <br><br>Neživý bude stále svázán fyzikálními vlastnostmi svého materiálu a tvaru (například pták nebude moct létat, i když má křídla). <br><br>Po vytvoření neživého (vdechnutí mu života) ho sesílatel může kdykoliv znovu na pohled rozhýbat, ovládat (dávat mu pokyny, neverbální) a opět převést do nehybné formy pomocí <strong>Povolání neživého.</strong>    </span></span>'}],"prikaz nezivemu - straz":[{tags:["dohled","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,neživý">    <span class="spell_text" tabindex="0">        Příkaz Neživému - Stráž    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel dá neživému příkaz, který platí až do <strong>Zrušení příkazu neživému</strong>. Neživý bude střežit nějaké místo nebo předmět zvolený sesílatelem, a v případě ohrožení ho začne fyzicky bránit.    </span></span>'}],"prikaz nezivemu - ochrana":[{tags:["dohled","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,neživý">    <span class="spell_text" tabindex="0">        Příkaz Neživému - Ochrana    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel dá neživému příkaz, který platí až do <strong>Zrušení příkazu neživému</strong>. Neživý bude chránit osobu zvolenou sesílatelem, a v případě ohrožení ji začne fyzicky bránit.    </span></span>'}],"prikaz nezivemu - nasledovani":[{tags:["dohled","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,neživý">    <span class="spell_text" tabindex="0">        Příkaz Neživému - Následování    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel dá neživému příkaz, který platí až do <strong>Zrušení příkazu neživému</strong>. Neživý bude následovat nebo pronásledovat osobu nebo zvíře, které sesílatel zvolil.    </span></span>'}],"zruseni prikazu nezivemu":[{tags:["dohled","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,neživý">    <span class="spell_text" tabindex="0">        Zrušení Příkazu Neživému    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel zruší dříve seslaný <strong>Příkaz neživému</strong>, funguje na vlastní i cizí neživé (úspěch závisí na síle mága a neživého)    </span></span>'}],"zapuzeni neziveho":[{tags:["dotyk","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,neživý">    <span class="spell_text" tabindex="0">        Zapuzení Neživého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel dotykem převede neživého zpět do dormantní (neaktivní) formy.    </span></span>'}],"proud svetla":[{tags:["projektil"],html:'<span data-html="true" class="tooltip " data-tags="projektil">    <span class="spell_text" tabindex="0">        Proud Světla    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🏹    <span class="icon-tooltip-text">        Projektil    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel vyšle z dlaně proud světla intenzity ekvivalentní pochodni. <br><br>Magické světlo může procházet skrz magickou tmu.    </span></span>'}],"cit zivota":[{tags:["sesilatel","informace"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,informace">    <span class="spell_text" tabindex="0">        Cit Života    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel na chvíli získá magický smysl, kterým vnímá životní energii a přítomnost živých organismů ve svém okolí. <br><br>Detekuje humanoidy a zvířata. Nedetekuje mrtvé, nemrtvé a neživé.    </span></span>'}],"cit nezivych":[{tags:["sesilatel","informace","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,informace,neživý">    <span class="spell_text" tabindex="0">        Cit Neživých    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel na chvíli získá magický smysl, kterým vnímá imitaci životní energie, jež pohání neživé a odhalí tak jejich přítomnost ve svém okolí. <br><br>Detekuje pouze neživé, ale to v aktivním i dormantním stavu.    </span></span>'}],"pozehnani presnosti - jemna motorika":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Přesnosti - Jemná Motorika    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel zlepší schopnost **jemné motoriky** cíle. <br><br>Pomáhá v situacích jako je míření střelných zbraní, odemykání zámků a kapsářství. <br><br>Doba trvání požehnání podle situace. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"utlumeni bolesti":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Utlumení Bolesti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel utlumí vnímání bolesti cílem. <br><br>Zlepšuje možnost boje se zraněním nebo výslech, uklidnění či ošetření zraněného. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"pozehnani smyslu":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Smyslů    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel posílí všechny přirozené smysly cíle (sluch, zrak, čich, chuť a hmat). <br><br>Všechny jsou požehnány jedním kouzlem, které je méně náročné než požehnání zraku a sluchu jednotlivě. <br><br>Doba trvání požehnání podle situace. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],neoslnitelnost:[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Neoslnitelnost    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel požehná cíl, který získá odolnost vůči oslnění z nadbytku světla. F<br><br>Funguje i v případě požehnání zraku. <br><br>Doba trvání požehnání podle situace. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"magicka zbroj":[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Magická Zbroj    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel obklopí sebou zvolený cíl magickou zbrojí. Magická zbroj pohlcuje fyzické zásahy tak jako například kyrys. <br><br>Magická zbroj má výdrž podle uvážení mastera, ale standardně se může jednat o několik zásahů šipkou z kuše nebo několik seků mečem. <br><br>Doba trvání magické zbroje, není-li dříve zničena, je přibližně jedna potyčka, boj. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],"narovnani kosti":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Narovnání Kosti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel magicky srovná všechny úlomky kosti v ráně v případě otevřených nebo tříštivých zlomenin pro správný <strong>Srůst kosti.</strong>    </span></span>'}],"obnova svalu":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Obnova Svalu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel zhojí, zacelí a obnoví poškozený nebo zcela utržený sval nebo skupinu svalů včetně jejich šlach. <br><br>Rozsah obnovy určuje náročnost kouzla.    </span></span>'}],"obnova kuze":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Obnova Kůže    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel obnoví poškozenou nebo ztracenou kůži, nejčastěji při popáleninách. <br><br>Rozsah obnovy určuje náročnost kouzla.    </span></span>'}],"uzdrav nemoc":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Uzdrav Nemoc    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel uzdraví jednu konkrétní nemoc nebo symptomy nemoci, které se v těle cíle vyskytují. <br><br>Mezi nemoci spadají například zažívací potíže, chřipka, angína.    </span></span>'}],"odstran infekci":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Odstraň Infekci    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel odstraní z těla cíle zárodečné patogeny a zánět infikovaných ran.    </span></span>'}],"odstran jed":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Odstraň Jed    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel odstraní z těla cíle jed. Při sesílání musí sesílatel znát charakter jedu, který chce odstranit.    </span></span>'}],"odhal tezkou nemoc":[{tags:["dohled","informace"],html:'<span data-html="true" class="tooltip " data-tags="dohled,informace">    <span class="spell_text" tabindex="0">        Odhal Těžkou Nemoc    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel odhalí přítomnost a druh těžké nemoci v těle cíle, ať už živém či mrtvém. <br><br>Mezi těžké nemoci spadají například dýmějový mor, tuberkulóza, černé neštovice. <br><br>Delší dobu po smrti již nemusí být těžká nemoc odhalitelná.    </span></span>'}],"stvoreni/povolani stredne velkeho neziveho":[{tags:["nezivy"],html:'<span data-html="true" class="tooltip " data-tags="neživý">    <span class="spell_text" tabindex="0">        Stvoření/Povolání Středně Velkého Neživého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel vytvoří neživého do velikosti velkého chrliče pomocí <strong>Stvoření středně velkého neživého</strong>. <br><br>Neživý může být z materiálů dřevo, hlína, kámen nebo kov. Musí mít fyzickou podobnost s živým organismem (například had, kočka, pes, chrlič). <br><br>Neživý bude stále svázán fyzikálními vlastnostmi svého materiálu a tvaru (například chrlič nebude moct létat, i když má křídla). <br><br>Po vytvoření neživého (vdechnutí mu života) ho sesílatel může kdykoliv znovu na pohled rozhýbat, ovládat (dávat mu pokyny, neverbální) a opět převést do nehybné formy pomocí <strong>Povolání neživého.</strong>    </span></span>'}],"stvoreni/povolani hejna malych nezivych":[{tags:["nezivy"],html:'<span data-html="true" class="tooltip " data-tags="neživý">    <span class="spell_text" tabindex="0">        Stvoření/Povolání Hejna Malých Neživých    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Místo stvoření nebo povolávání jednotlivých malých neživých (do velikosti loutky) je sesílatel může stvořit nebo povolat hromadně. <br><br>Hromadně (potenciálně i jednotlivce) zvládne na pohled stvořit/povolat malých neživých tolik, kolik jich udrží ve spojených dlaních, nebo deset, cokoliv je z těchto dvou hodnot větší. <br><br>Celé hejno plní stejný příkaz, ale tento příkaz není potřeba sesílat na každého jednotlivě.    </span></span>'}],"cteni pameti neziveho":[{tags:["dohled","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,neživý">    <span class="spell_text" tabindex="0">        Čtení Paměti Neživého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel prohledá paměť neživého a získá z ní informace. <br><br>Neživý je schopný vnímat výrazné osoby a události na místě, kde se nachází, zároveň intenzivně pamatuje jakékoliv přímé interakce s ním samotným v aktivním i dormantním stavu.    </span></span>'}],"ovladnuti neziveho":[{tags:["dohled","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,neživý">    <span class="spell_text" tabindex="0">        Ovládnutí Neživého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel ovládne neživého vytvořeného jiným mágem. <br><br>Umožní sesílateli po ovládnutí dávat neživému příkazy, jako by byl jeho stvořitelem. <br><br>Šance na ovládnutí závisí na síle vůle sesílatele a stvořitele cílového neživého.    </span></span>'}],"aura svetla":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Aura Světla    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Z těla cíle začne vyzařovat aura světla o intenzitě ekvivalentní pochodni.<br><br>Magické světlo může procházet skrz magickou tmu.    </span></span>'}],stesti:[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Štěstí    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel požehná cíl štěstím. <br><br>Štěstí se může projevovat příhodnou trajektorií vlastních i nepřátelských projektilů a obecně náklonem náhodného elementu ku prospěchu cíle. <br><br>Doba trvání požehnání podle situace. <br><br>Všechna požehnání jsou v základu na dotyk.    </span></span>'}],neunavnost:[{tags:["dotyk","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,požehnání">    <span class="spell_text" tabindex="0">        Neúnavnost    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel požehná cíl schopností nepociťovat únavu. <br><br>Cíl může neomezeně vykonávat náročné aktivity jako je boj, sprint či sesílání kouzel, bez jakéhokoliv omezení. <br><br>Po vyprchání efektu požehnání se všechna využitá energie na dluh spotřebuje, což může v extrémních případech vyústit až v okamžitou smrt.    </span></span>'}],"obnova organu":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Obnova Orgánu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel zhojí, zacelí a obnoví poškozený nebo zcela zničený orgán. <br><br>Příklady cílů jsou probodnutá plíce, mozková mrtvice, poškození sítnice nebo vnitřní poranění břišní dutiny. <br><br>Rozsah obnovy určuje náročnost kouzla.    </span></span>'}],"obnova kosti":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Obnova Kosti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel zhojí nebo obnoví závažně poškozenou nebo zcela chybějící kost. <br><br>Rozsah obnovy určuje náročnost kouzla.    </span></span>'}],regenerace:[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Regenerace    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel posílí přirozenou regenerační schopnost cíle na nadlidskou úroveň. <br><br><strong>Regenerace</strong> nedokáže řešit akutní stavy, je spíše vhodná pro méně závažná, ale rozsáhlá poranění.    </span></span>'}],"uzdrav tezkou nemoc":[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Uzdrav Těžkou Nemoc    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel uzdraví jednu konkrétní těžkou nemoc nebo symptomy těžké nemoci, které se v těle cíle vyskytují. <br><br>Mezi těžké nemoci spadají například dýmějový mor, tuberkulóza, černé neštovice.    </span></span>'}],"stvoreni/povolani velkeho neziveho":[{tags:["nezivy"],html:'<span data-html="true" class="tooltip " data-tags="neživý">    <span class="spell_text" tabindex="0">        Stvoření/Povolání Velkého Neživého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel vytvoří neživého bez limitu velikosti (velikost neživého určuje náročnost) pomocí <strong>Stvoření velkého neživého</strong>. <br><br>Neživý může být z materiálů dřevo, hlína, kámen nebo kov. Musí mít fyzickou podobnost s živým organismem (například socha, medvěd, strom, wyverna). <br><br>Neživý bude stále svázán fyzikálními vlastnostmi svého materiálu a tvaru (například wyverna nebude moct létat, i když má křídla). <br><br>Po vytvoření neživého (vdechnutí mu života) ho sesílatel může kdykoliv znovu na pohled rozhýbat, ovládat (dávat mu pokyny, neverbální) a opět převést do nehybné formy pomocí <strong>Povolání neživého.</strong>    </span></span>'}],"stvoreni/povolani hejna strednich nezivych":[{tags:["nezivy"],html:'<span data-html="true" class="tooltip " data-tags="neživý">    <span class="spell_text" tabindex="0">        Stvoření/Povolání Hejna Středních Neživých    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Místo stvoření nebo povolávání jednotlivých středních neživých (do velikosti velkého chrliče) je sesílatel může stvořit nebo povolat hromadně. <br><br>Hromadně (potenciálně i jednotlivce) zvládne na pohled stvořit/povolat středně velkých neživých tolik, kolik se jich vejde do prostorné latríny, nebo 7, cokoliv je z těchto dvou hodnot větší. <br><br>Celé hejno plní stejný příkaz, ale tento příkaz není potřeba sesílat na každého jednotlivě.    </span></span>'}],"neziva zbroj":[{tags:["nezivy"],html:'<span data-html="true" class="tooltip " data-tags="neživý">    <span class="spell_text" tabindex="0">        Neživá Zbroj    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel vytvoří neživého v podobě zbroje, která kopíruje jeho tělo, a hýbe se společně se sesílatelem. <br><br>Neživý může být z materiálů dřevo, hlína, kámen nebo kov.    </span></span>'}],"pomoc zivych tvoru":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Pomoc Živých Tvorů    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel se magicky propojí se živými zvířaty v okolí a vnutí jim pocit, že patří do jejich smečky/hejna.<br><br>V případě ohrožení sesílatele ho zvířata mohou bránit. <br><br>Lépe funguje na méně inteligentní zvířata, efekt na vyšší savce je menší, efekt na tvora dostatečně inteligentního, aby byl schopen řeči, je zanedbatelný.    </span></span>'}],"znacka zivota":[{tags:["soustredeni"],html:'<span data-html="true" class="tooltip " data-tags="soustředění">    <span class="spell_text" tabindex="0">        Značka Života    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel provede na cíli rituál, kterým si ho označí tak, aby na něj nadále byl schopen sesílat kouzla, jako by se ho dotýkal, ať je cíl kdekoliv. <br><br><strong>Značka života</strong> trvá věčně, ale sesílatel současně může mít pouze tolik značek, kolik si dokáže okamžitě kdykoliv vybavit, v případě zapomnění značka zaniká. <br><br>Vyžaduje sesílatelovu plnou koncentraci.    </span></span>'}],"dlouhodobe pozehnani":[{tags:["pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="požehnání">    <span class="spell_text" tabindex="0">        Dlouhodobé Požehnání    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>
