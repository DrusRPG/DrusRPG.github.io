 </span>    <span class="tooltiptext blessing_glow">        Sesílatel sešle na cíl jiné požehnání za cenu enormního množství energie. Energie do kouzla vložená se uvolňuje postupně po delší dobu. Doba trvání kouzla záleží na schopnostech sesílatele, rámcově několik dní až několik měsíců.    </span></span>'}],"pozehnani pohledem":[{tags:["dohled","pozehnani"],html:'<span data-html="true" class="tooltip " data-tags="dohled,požehnání">    <span class="spell_text" tabindex="0">        Požehnání Pohledem    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Umožní sesílateli sesílat požehnání pohledem místo dotyku. Seslat stejné kouzlo pohledem je asi o trochu náročnější oproti dotyku.    </span></span>'}],"aura pozehnani":[{tags:["sesilatel","pozehnani","soustredeni"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,požehnání,soustředění">    <span class="spell_text" tabindex="0">        Aura Požehnání    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🙏    <span class="icon-tooltip-text">        Požehnání    </span></span> <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span>    </span>    <span class="tooltiptext blessing_glow">        Sesílatel po dobu udržování kouzla může sesílat zvolené požehnání na všechny živé bytosti ve svém blízkém okolí. Rozsah oblasti kouzla záleží na schopnostech sesílatele, typicky 10 metrů. Síla požehnání a doba trvání kouzla dramaticky zvyšují energetickou náročnost. Vyžaduje sesílatelovu plnou koncentraci.    </span></span>'}],oziveni:[{tags:["dotyk","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení">    <span class="spell_text" tabindex="0">        Oživení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel dotykem oživí cíl krátce po jeho smrti. Je potřeba v první řadě odstranit příčinu úmrtí, jinak cíl zemře okamžitě znovu. Delší dobu po smrti již nelze cíl oživit.    </span></span>'}],zhojeni:[{tags:["dotyk","leceni","soustredeni"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,léčení,soustředění">    <span class="spell_text" tabindex="0">        Zhojení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span> <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel cíli po dobu udržování kouzla hojí všechna zranění svalů, kůže, kostí i orgánů. Doplňuje chybějící tělní tekutiny a odstraňuje jedy. Rozsah zranění a doba trvání kouzla dramaticky zvyšují energetickou náročnost, která je už v základu značná. Vyžaduje sesílatelovu plnou koncentraci.    </span></span>'}],"dlouhodobe leceni":[{tags:["leceni"],html:'<span data-html="true" class="tooltip " data-tags="léčení">    <span class="spell_text" tabindex="0">        Dlouhodobé Léčení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel sešle na cíl jiné léčivé kouzlo za cenu enormního množství energie. Energie do kouzla vložená se uvolňuje postupně po delší dobu. Doba trvání kouzla záleží na schopnostech sesílatele, rámcově několik dní až několik měsíců.    </span></span>'}],"leceni pohledem":[{tags:["dohled","leceni"],html:'<span data-html="true" class="tooltip " data-tags="dohled,léčení">    <span class="spell_text" tabindex="0">        Léčení Pohledem    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span>    </span>    <span class="tooltiptext heal_glow">        Umožní sesílateli sesílat léčivá kouzla pohledem místo dotyku. Seslat stejné kouzlo pohledem je asi o polovinu náročnější oproti dotyku.    </span></span>'}],"aura leceni":[{tags:["sesilatel","leceni","soustredeni"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,léčení,soustředění">    <span class="spell_text" tabindex="0">        Aura Léčení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    ❤️    <span class="icon-tooltip-text">        Léčení    </span></span> <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span>    </span>    <span class="tooltiptext heal_glow">        Sesílatel po dobu udržování kouzla může sesílat zvolené léčivé kouzlo na všechny živé bytosti ve svém blízkém okolí. Rozsah oblasti kouzla záleží na schopnostech sesílatele, typicky 10 metrů. Rozsah zranění a doba trvání kouzla dramaticky zvyšují energetickou náročnost. Vyžaduje sesílatelovu plnou koncentraci.    </span></span>'}],"stvoreni/povolani hejna velkych nezivych":[{tags:["nezivy"],html:'<span data-html="true" class="tooltip " data-tags="neživý">    <span class="spell_text" tabindex="0">        Stvoření/Povolání Hejna Velkých Neživých    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Místo stvoření nebo povolávání jednotlivých velkých neživých je sesílatel může stvořit nebo povolat hromadně. Hromadně (potenciálně i jednotlivce) zvládne na pohled stvořit/povolat středně velkých neživých tolik, kolik se jich vejde na verandu na Roxaně, nebo 5, cokoliv je z těchto dvou hodnot větší. Celé hejno plní stejný příkaz, ale tento příkaz není potřeba sesílat na každého jednotlivě.    </span></span>'}],"hromadne ovladnuti neziveho":[{tags:["dohled","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,neživý">    <span class="spell_text" tabindex="0">        Hromadné Ovládnutí Neživého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel ovládne v okolí všechny neživé vytvořené jinými mágy. Umožní sesílateli po ovládnutí dávat neživým příkazy, jako by byl jeho stvořitelem. Šance na ovládnutí cizích neživých závisí na síle vůle sesílatele a stvořitele cílového neživého.    </span></span>'}],"hromadny prikaz nezivym":[{tags:["dohled","soustredeni","nezivy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,soustředění,neživý">    <span class="spell_text" tabindex="0">        Hromadný Příkaz Neživým    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span> <span class="icon-tooltip">    🗿    <span class="icon-tooltip-text">        Neživý    </span></span>    </span>    <span class="tooltiptext light_glow">        Sesílatel může po dobu sesílání kouzla rozkazovat všem neživým ve svém okolí a každému dávat příkazy nezávisle. Množství neživých, které může sesílatel ovládat najednou, je silně závislý na schopnostech uživatele, stejně jako náročnost kouzla. Vyžaduje sesílatelovu plnou koncentraci.    </span></span>'}],"ochoceni ziveho tvora":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Ochočení Živého Tvora    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel se magicky propojí se živými zvířaty v okolí a ochočí si je. Ochočená zvířata budou sesílatele dlouhodobě vnímat pozitivně a snažit se mu vyhovět, ačkoliv špatné zacházení ze strany sesílatele může tento proces rychle zvrátit. Lépe funguje na méně inteligentní zvířata, efekt na vyšší savce je menší, efekt na tvora dostatečně inteligentního, aby byl schopen řeči, je zanedbatelný.    </span></span>'}],slabost:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Slabost    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel oslabí všechny údery cíle a sníží jeho celkovou fyzickou výdrž. <br><br>Nijak nebrání v mentální činnosti.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],nepresnost:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Nepřesnost    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel zhorší schopnost jemné motoriky cíle. <br><br>Komplikuje akce jako je míření střelných zbraní, odemykání zámků a kapsářství.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],hluchota:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Hluchota    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel prokleje cílovou bytost tak, že po dobu trvání kouzla nic neuslyší.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],"prokleti cichu":[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Prokletí Čichu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel prokleje cílovou bytost tak, že po dobu trvání kouzla nic neucítí.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],"povolani zombie":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Povolání Zombie    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel vytvoří z mrtvoly v dohledu zombie pod kontrolou sesílatele.<br><br>Zombie je jednoduchý nemrtvý, který se pohybuje typicky pomalu a je schopen vykonávat jen velmi jednoduché příkazy. <br><br>Je vhodný jen jako základní služebník, k boji jsou použitelní jen ve velkém počtu.<br><br>V rámci oživování sesílatel může poškozené tělo vyléčit do neživota-schopného stavu, větší zranění a delší doba rozkladu vyžadují dramaticky více energie.    </span></span>'}],"oziv maleho tvora":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Oživ Malého Tvora    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel z malého mrtvého tvora (do velikosti kočky) vytvoří nemrtvého pod kontrolou sesílatele.<br><br>Tento tvor je ve vykonávání příkazů omezen inteligencí, jakou měl před smrtí, a fyzickými omezeními. <br><br>Pro svou dobrou inteligenci jsou jako služebníci oblíbeni havrani.<br><br>V rámci oživování sesílatel může poškozené tělo vyléčit do neživota-schopného stavu, větší zranění a delší doba rozkladu vyžadují dramaticky více energie.    </span></span>'}],"povolani duse":[{tags:["duse"],html:'<span data-html="true" class="tooltip " data-tags="duše">    <span class="spell_text" tabindex="0">        Povolání Duše    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👻    <span class="icon-tooltip-text">        Duše    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel přivolá vědomí zesnulého cíle a poskytne mu nehmotnou magickou formu schopnou řeči.<br><br>Povolaná duše nemá žádnou povinnost poslouchat sesílatele ani s ním jinak spolupracovat, k tomu je potřeba seslat <strong>Spoutání duše ke svojí vůli</strong>.    </span></span>'}],"obnov nemrtveho":[{tags:["dotyk","nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,nemrtvý">    <span class="spell_text" tabindex="0">        Obnov Nemrtvého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel vyléčí zraněného nemrtvého do neporušeného stavu.<br><br>Větší zranění a delší doba rozkladu vyžadují dramaticky více energie.    </span></span>'}],"exploze nemrtveho":[{tags:["dohled","nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,nemrtvý">    <span class="spell_text" tabindex="0">        Exploze Nemrtvého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel pohledem zničí nemrtvého, který se rozprskne do sprchy úštěpků tkání a kostí, které mohou zranit cíle v okolí.<br><br>Explodovaného nemrtvého nelze obnovit.<br><br>Pokud se sesílatel snaží zničit nemrtvého patřícího jinému mágovi, dochází k souboji vůle mezi oběma mágy.<br><br>Schopnost chránit svého nemrtvého před zničením jiným mágem závisí na schopnostech obou mágů a vzdálenosti majitele a jeho nemrtvého.    </span></span>'}],"paralyzacni jed":[{tags:["dotyk","zbran","jed"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,zbraň,jed">    <span class="spell_text" tabindex="0">        Paralyzační Jed    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🗡️    <span class="icon-tooltip-text">        Zbraň    </span></span> <span class="icon-tooltip">    ☠️    <span class="icon-tooltip-text">        Jed    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel dotykem očaruje cílovou zbraň magickým jedem, který při zásahu zbraní postupně od místa zranění ochrnuje svaly zasažené bytosti.<br><br>Lze seslat též dotykem ruky, kdy si lze do role zbraně dosadit sesílatelův nehet. V takovém případě se ale musí dotknout kůže, nefunguje přes textil.<br><br>Rychlost šíření jedu závisí na rozsahu rány a schopnostech sesílatele.    </span></span>'}],"krec svalu":[{tags:["dotyk"],html:'<span data-html="true" class="tooltip " data-tags="dotyk">    <span class="spell_text" tabindex="0">        Křeč Svalu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel dotykem donutí cílový kosterní sval se stáhnout a ten přestane fungovat. Nejlépe funguje na část těla (stehno, předloktí...). <br><br>Cílit na konkrétní sval/větší množství svalů je náročnější.    </span></span>'},{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Křeč Svalu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel pohledem donutí cílový kosterní sval se stáhnout a ten přestane fungovat. Nejlépe funguje na část těla (stehno, předloktí...). <br><br>Cílit na konkrétní sval/větší množství svalů je náročnější.    </span></span>'}],"vysati zivota":[{tags:["dotyk","vysati"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,vysátí">    <span class="spell_text" tabindex="0">        Vysátí Života    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🧛🏻‍♀️    <span class="icon-tooltip-text">        Vysátí    </span></span>    </span>    <span class="tooltiptext death_glow">        Po dobu trvání kouzla sesílatel vysává životní sílu zasaženého, sobě doplňuje energii.<br><br>Rychlost vysávání života závisí na schopnostech sesílatele.<br><br>Životní energie s sebou nese esenci někoho jiného, a to se ve velkém množství má tendenci na sesílateli projevit.<br><br>Po vysátí stromu bude sesílatel mít zdřevěnělé končetiny, po vysátí někoho opravdu hloupého bude mít nějakou dobu problém se soustředit, při vysátí někoho opravdu nešťastného bude mít sesílatel depresi apod. Při častém vysávání velkého množství energie může dojít k trvalým změnám na sesílateli.<br><br>Doporučuje se s tímto kouzlem zacházet opatrně a mezi použitími mít alespoň několik dní pauzy.    </span></span>'}],"vysati mrtveho":[{tags:["dotyk","vysati"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,vysátí">    <span class="spell_text" tabindex="0">        Vysátí Mrtvého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🧛🏻‍♀️    <span class="icon-tooltip-text">        Vysátí    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel vysaje zbytkovou životní energii z mrtvého těla (ať už bylo živé nebo nemrtvé), čímž si doplňuje energii.<br><br>Rychlost vysávání mrtvého závisí na schopnostech sesílatele.<br><br>Toto tělo se instantně rozpadne na prach a nemůže být nadále použito pro jakákoliv jiná kouzla.<br><br>Množství energie získané z mrtvol je typicky malé, na rozdíl od <strong>Vysátí života</strong> ovšem nenese esenci mrtvoly, dá se tedy snadno opakovat bez rizika vedlejších účinků.    </span></span>'}],"vysati nemrtveho":[{tags:["dotyk","vysati"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,vysátí">    <span class="spell_text" tabindex="0">        Vysátí Nemrtvého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🧛🏻‍♀️    <span class="icon-tooltip-text">        Vysátí    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel vysaje z cílového nemrtvého magickou energii, která ho udržuje při neživotě. Sesílateli toto doplňuje energii.<br><br>Rychlost vysávání nemrtvého závisí na schopnostech sesílatele.<br><br>Vysátý nemrtvý není tímto kouzlem zničen, pouze převeden zpět do mrtvého stavu.<br><br>Energie získaná z tohoto kouzla nenese ničí esenci, dá se tedy snadno opakovat bez rizika vedlejších účinků.<br><br>Pokud se sesílatel snaží vysát nemrtvého patřícího jinému mágovi, dochází k souboji vůle mezi oběma mágy.<br><br>Schopnost chránit svého nemrtvého před vysátím jiným mágem závisí na schopnostech obou mágů a vzdálenosti majitele a jeho nemrtvého.    </span></span>'}],tma:[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Tma    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel vytvoří v cílovém místě magickou tmu, ve které nikdo nic neuvidí.<br><br>Běžné zdroje světla (louče, lampy, slunce...) magickou tmu neprosvítí, při kontaktu s magickým světlem vítězí kouzlo schopnějšího mága.    </span></span>'}],"cit smrti":[{tags:["sesilatel","informace"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,informace">    <span class="spell_text" tabindex="0">        Cit Smrti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🔍    <span class="icon-tooltip-text">        Informace    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel na chvíli získá magický smysl, kterým vnímá přítomnost smrti ve svém okolí. <br><br>Odhalí mrtvoly, nemrtvé, duše, a výrazná místa nedávné smrti v okolí.    </span></span>'}],slepota:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Slepota    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel prokleje cílovou bytost tak, že po dobu trvání kouzla nic neuvidí.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],dezorientace:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Dezorientace    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel prokleje cílovou bytost tak, že po dobu trvání kouzla ztratí přehled o tom, kde je, a kterým směrem se má pohybovat.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],nesikovnost:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Nešikovnost    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel po dobu trvání kouzla výrazně zhorší schopnost cílové bytosti správně ovládat zbraně a nástroje, ta navíc ztratí jemnou motoriku.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],"ztrata rovnovahy":[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Ztráta Rovnováhy    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel po dobu trvání kouzla výrazně naruší rovnováhu cílové bytosti. Pokud vidí a je na rovné podlaze, tak se stěží udrží na nohou, jinak padá a nezvládne se zvednout.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],strach:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Strach    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel po dobu trvání kouzla naplní cílovou ss="spell_text" tabindex="0">        Zranitelnost    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel prokleje cílovou bytost tak, že jí zásahy zbraněmi a kouzly způsobí větší zranění, než by způsobily normálně.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],"povolani ghula":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Povolání Ghůla    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel vytvoří z mrtvoly v dohledu ghůla pod kontrolou sesílatele.<br><br>Ghůl je základní bojový nemrtvý, který v procesu oživování získá ostřejší zuby, prsty se mu přetvoří na kostěné drápy a pánev se překroutí, aby lépe vyhovovala pohybu po čtyřech. <br><br>Ghůl je určen k boji a není vybaven inteligencí na plnění komplikovanějších příkazů. Naopak v boji či při sledování umí dobře fungovat jako smečka.<br><br>Ghůlové se rychle pohybují po čtyřech, dobře skáčou a šplhají. Navíc mají zostřené smysly na detekci živých, což jim umožňuje dobře se orientovat i ve tmě, včetně magické tmy.<br><br>V rámci oživování sesílatel může poškozené tělo vyléčit do neživota-schopného stavu, větší zranění a delší doba rozkladu vyžadují dramaticky více energie.    </span></span>'}],"oziv stredne velkeho tvora":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Oživ Středně Velkého Tvora    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel ze středně velkého mrtvého tvora (do velikosti velkého psa) vytvoří nemrtvého pod kontrolou sesílatele.<br><br>Tento tvor je ve vykonávání příkazů omezen inteligencí, jakou měl před smrtí, a fyzickými omezeními. <br><br>Pro svou dobrou inteligenci jsou oblíbené psovité a lasicovité šelmy.<br><br>V rámci oživování sesílatel může poškozené tělo vyléčit do neživota-schopného stavu, větší zranění a delší doba rozkladu vyžadují dramaticky více energie.    </span></span>'}],"spoutani duse ke svoji vuli":[{tags:["dohled","duse"],html:'<span data-html="true" class="tooltip " data-tags="dohled,duše">    <span class="spell_text" tabindex="0">        Spoutání Duše ke Svojí Vůli    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    👻    <span class="icon-tooltip-text">        Duše    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel podstoupí souboj vůle s duší povolanou pomocí kouzla <strong>Povolání duše</strong>. Pokud uspěje, převede duši pod svou kontrolu.<br><br>Duše pod kontrolou sesílatele se mu nemůže vzepřít, odpovídá na jeho otázky a dělá, co jí sesílatel přikáže.<br><br>Vzhledem k jejímu nehmotnému stavu je služba od duše limitovaná na příjemného konverzačního partnera.    </span></span>'}],"oziv cloveka":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Oživ Člověka    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel z mrtvého humanoida vytvoří nemrtvého pod kontrolou sesílatele.<br><br>Tímto kouzlem je možno oživit libovolného inteligentního humanoida velikostně srovnatelného s člověkem (orka ještě ano, krola už ne).<br><br>Cílový nemrtvý je ve vykonávání příkazů omezen inteligencí, jakou měl před smrtí, a fyzickými omezeními.<br><br>Nemrtvý si zachovává mundání schopnosti, které měl před smrtí (kovář bude umět stále stejně vykovat meč apod.), ale nevztahuje se na schopnost nemrtvých mágů kouzlit.<br><br>V rámci oživování sesílatel může poškozené tělo vyléčit do neživota-schopného stavu, větší zranění a delší doba rozkladu vyžadují dramaticky více energie.    </span></span>'}],"jed do nemrtveho":[{tags:["dohled","jed","nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,jed,nemrtvý">    <span class="spell_text" tabindex="0">        Jed do Nemrtvého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    ☠️    <span class="icon-tooltip-text">        Jed    </span></span> <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel pohledem sešle jedové kouzlo, které zná, na nemrtvého pod svou kontrolou.<br><br>Všechna zranění nemrtvým způsobená budou otrávená a exploze takového nemrtvého rozmetá jed po okolí.    </span></span>'}],"smrtelny jed":[{tags:["dotyk","zbran","jed"],html:'<span data-html="true" class="tooltip " data-tags="dotyk,zbraň,jed">    <span class="spell_text" tabindex="0">        Smrtelný Jed    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span> <span class="icon-tooltip">    🗡️    <span class="icon-tooltip-text">        Zbraň    </span></span> <span class="icon-tooltip">    ☠️    <span class="icon-tooltip-text">        Jed    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel dotykem očaruje cílovou zbraň magickým jedem, který při zásahu zbraní postupně od místa zranění způsobuje nekrózu svalů zasažené bytosti, až na konec cíl zabije.<br><br>Lze seslat též dotykem ruky, kdy si lze do role zbraně dosadit sesílatelův nehet. V takovém případě se ale musí dotknout kůže, nefunguje přes textil.<br><br>Rychlost šíření jedu závisí na rozsahu rány a schopnostech sesílatele.    </span></span>'}],"dusivy oblak":[{tags:["dohled","jed"],html:'<span data-html="true" class="tooltip " data-tags="dohled,jed">    <span class="spell_text" tabindex="0">        Dusivý Oblak    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    ☠️    <span class="icon-tooltip-text">        Jed    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel vytvoří v cílové oblasti magický oblak dráždivého plynu, který dusí ty, kteří se ho nadýchají.<br><br>Efekt oblaku je podobný jako kouř z ohně a při krátké expozici se nemagicky špatně odstraňuje z těla zasaženého, jeho efekt trvá pár dní.<br><br>Dokud oblaku sesílatel věnuje plnou pozornost, je schopen držet ho na cílovém místě a pomalu s ním hýbat. Při přerušení koncentrace se oblak volně šíří s větrem a už ho nejde znovu získat pod kontrolu.<br><br>Potence jedu je závislá na schopnostech sesílatele a době expozice.    </span></span>'}],horecka:[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Horečka    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel po dobu trvání kouzla způsobí bytosti horečku se všemi jejími projevy jako je únava, zimnice, lehká dezorientace.<br><br>Doba trvání kouzla závisí na schopnostech sesílatele.    </span></span>'}],"trzna rana":[{tags:["dotyk"],html:'<span data-html="true" class="tooltip " data-tags="dotyk">    <span class="spell_text" tabindex="0">        Tržná Rána    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel dotykem způsobí cíli hlubokou tržnou ránu v místě dotyku.    </span></span>'},{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Tržná Rána    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel pohledem způsobí cíli hlubokou tržnou ránu.    </span></span>'}],"videni ve tme":[{tags:["sesilatel"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel">    <span class="spell_text" tabindex="0">        Vidění ve Tmě    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel získá magický zrak, kterým vidí ve tmě (včetně magické tmy) jako za jasného dne.    </span></span>'}],nestesti:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Neštěstí    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel prokleje cíl neštěstím, které ho bude sužovat, dokud prokletí trvá.<br><br>Neštěstí se může projevovat nešťastnou trajektorií vlastních i nepřátelských projektilů a obecně vlivem náhodného elementu v neprospěch cíle. <br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],mdloby:[{tags:["dohled","prokleti"],html:'<span data-html="true" class="tooltip " data-tags="dohled,prokletí">    <span class="spell_text" tabindex="0">        Mdloby    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel prokleje cílový organismus tak, že cíl okamžitě ztratí vědomí a není schopen se probrat, dokud prokletí trvá.<br><br>Doba trvání prokletí závisí na situaci a schopnostech sesílatele.    </span></span>'}],"oziv organismus":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Oživ Organismus    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel z libovolně velkého mrtvého tvora (velikost nemrtvého určuje náročnost) vytvoří nemrtvého pod kontrolou sesílatele.<br><br>Tento tvor je ve vykonávání příkazů omezen inteligencí, jakou měl před smrtí, a fyzickými omezeními. <br><br>Umožňuje oživit i inteligentní či pseudo-inteligentní humanoidy znatelně větší než člověk (krol, trol).<br><br>V rámci oživování sesílatel může poškozené tělo vyléčit do neživota-schopného stavu, větší zranění a delší doba rozkladu vyžadují dramaticky více energie.    </span></span>'}],"spoutani duse/nemrtveho k vuli jineho":[{tags:["dohled","nemrtvy","duse"],html:'<span data-html="true" class="tooltip " data-tags="dohled,nemrtvý,duše">    <span class="spell_text" tabindex="0">        Spoutání Duše/Nemrtvého k Vůli Jiného    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span> <span class="icon-tooltip">    👻    <span class="icon-tooltip-text">        Duše    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel se vzdá kontroly nad duší nebo nemrtvým a přiváže ho k vůli někoho jiného.<br><br>Novým pánem nemrtvého může být kdokoliv, nemusí ovládat magii smrti. Převést nemrtvého pod kontrolu kontramága stále vyžaduje nejdříve kontramága prokouzlit do bezvědomí.<br><br>Nemrtvý bude poslouchat pokyny svého nového pána, jakkoliv mu je pán je schopen předat. Tzn. jiní mágové smrti mohou nemrtvého ovládat myšlenkou, mágové mysli zase třeba sugescemi.    </span></span>'}],"smrtici oblak":[{tags:["dohled","jed"],html:'<span data-html="true" class="tooltip " data-tags="dohled,jed">    <span class="spell_text" tabindex="0">        Smrtící Oblak    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    ☠️    <span class="icon-tooltip-text">        Jed    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel vytvoří v cílové oblasti magický oblak jedovatého plynu, který otráví ty, kteří se ho nadýchají.<br><br>Jed se dobře váže do krve a i při krátké expozici se nemagicky špatně odstraňuje z těla zasaženého, jeho efekt trvá pár dní.<br><br>I pokud je expozice velmi krátká a účinky jedu nejsou smrtící, zasažený trpí neskutečnými bolestmi, které ho vyřazují z běžného provozu.<br><br>Dokud oblaku sesílatel věnuje plnou pozornost, je schopen držet ho na cílovém místě a pomalu s ním hýbat. Při přerušení koncentrace se oblak volně šíří s větrem a už ho nejde znovu získat pod kontrolu.<br><br>Potence jedu je závislá na schopnostech sesílatele a době expozice.    </span></span>'}],paralyza:[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Paralýza    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel po dobu trvání kouzla uvede cílovou bytost do nehybného stavu tím, že cíli okamžitě přestanou fungovat všechny svaly kromě dýchacích.<br><br>Doba trvání závisí na schopnostech sesílatele.<br><br>Energetická náročnost závisí na velikosti cílové bytosti.    </span></span>'}],"vysati energie":[{tags:["dohled","vysati"],html:'<span data-html="true" class="tooltip " data-tags="dohled,vysátí">    <span class="spell_text" tabindex="0">        Vysátí Energie    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧛🏻‍♀️    <span class="icon-tooltip-text">        Vysátí    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel získává možnost sesílat své libovolné vysávající kouzlo pohledem.    </span></span>'}],"videni ve tme - ostatni":[{tags:["dotyk"],html:'<span data-html="true" class="tooltip " data-tags="dotyk">    <span class="spell_text" tabindex="0">        Vidění ve Tmě - Ostatní    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🖐️    <span class="icon-tooltip-text">        Dotyk    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel po dobu trvání kouzla dodává cílové bytosti magický zrak, kterým vidí ve tmě (včetně magické tmy) jako za jasného dne.<br><br>Umožní vybranému cíli vidět ve tmě (včetně magické tmy) jako za jasného dne.    </span></span>'}],"znacka smrti":[{tags:["soustredeni"],html:'<span data-html="true" class="tooltip " data-tags="soustředění">    <span class="spell_text" tabindex="0">        Značka Smrti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel provede na cíli rituál, kterým si ho označí tak, aby na něj nadále byl schopen sesílat kouzla, jako by se ho dotýkal, ať je cíl kdekoliv.<br><br><strong>Značka smrti</strong> trvá věčně, ale sesílatel současně může mít pouze tolik značek, kolik si dokáže okamžitě kdykoliv vybavit, v případě zapomnění značka zaniká.<br><br>Vyžaduje sesílatelovu plnou koncentraci.    </span></span>'}],"hromadne prokleti":[{tags:["prokleti"],html:'<span data-html="true" class="tooltip " data-tags="prokletí">    <span class="spell_text" tabindex="0">        Hromadné Prokletí    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel sešle zvolené prokletí na několik cílů ve svém okolí najednou.  Počet možných cílů závisí na schopnostech uživatele, do základu 4.    </span></span>'}],"dlouhodobe prokleti":[{tags:["prokleti"],html:'<span data-html="true" class="tooltip " data-tags="prokletí">    <span class="spell_text" tabindex="0">        Dlouhodobé Prokletí    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🐈‍⬛    <span class="icon-tooltip-text">        Prokletí    </span></span>    </span>    <span class="tooltiptext curse_glow">        Sesílatel sešle na cíl jiné prokletí za cenu enormního množství energie. Energie do kouzla vložená se uvolňuje postupně po delší dobu.  Doba trvání kouzla záleží na schopnostech sesílatele, rámcově několik dní až několik měsíců.    </span></span>'}],"oziveni maga":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Oživení Mága    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel oživí zemřelého mága jako nemrtvého pod kontrolou sesílatele. Nemrtvý si zachová svou znalost magie. Sesílatel musí umět oživit dostatečně velkého nemrtvého, aby mohl kouzlo seslat (na nemrtvého mága krola tedy potřebuje znát kouzlo <strong>Oživ organismus</strong> apod.).    </span></span>'}],"povolani nemrtveho konstruktu":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Povolání Nemrtvého Konstruktu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel vytvoří z několika mrtvých těl konstrukt, který následně oživí jako nemrtvého.  Tvar a velikost konstruktu závisí pouze na schopnostech a představivosti sesílatele, ovšem je omezen stavem mrtvých těl.  Pokud sesílatel zná kouzlo <strong>Oživ Člověka</strong> nebo <strong>Oživ Organismus</strong>, je možné konstruktu pomocí těchto kouzel ponechat vědomí jednoho zvoleného mrtvého těla, které bylo v konstruktu použito.    </span></span>'}],"oziveni v jine forme":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Oživení v Jiné Formě    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel oživí nemrtvého jiným kouzlem oživujícím neživé, ovšem zvolené mrtvé tělo si přetvoří podle své vůle, může ho části odstranit a podobně.  Pokud oživí formu ve stavu neslučitelné se životem, bude udržování nemrtvého při neživotě vyžadovat velké množství energie.    </span></span>'}],"ovladnuti nemrtveho":[{tags:["dohled","nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="dohled,nemrtvý">    <span class="spell_text" tabindex="0">        Ovládnutí Nemrtvého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel ovládne nemrtvého vytvořeného jiným mágem. Sesílatel nad nemrtvým získá stejnou kontrolu, jako by byl jeho stvořitelem. Šance na ovládnutí závisí na síle vůle sesílatele a stvořitele cílového nemrtvého.    </span></span>'}],"kouzleni skrz nemrtveho":[{tags:["nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="nemrtvý">    <span class="spell_text" tabindex="0">        Kouzlení Skrz Nemrtvého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel získá možnost sesílat svá kouzla, jako by byl na místě jím zvoleného nemrtvého, kterého má pod svou kontrolou.    </span></span>'}],"vnimani skrze nemrtveho":[{tags:["soustredeni","nemrtvy"],html:'<span data-html="true" class="tooltip " data-tags="soustředění,nemrtvý">    <span class="spell_text" tabindex="0">        Vnímání Skrze Nemrtvého    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span> <span class="icon-tooltip">    🧟    <span class="icon-tooltip-text">        Nemrtvý    </span></span>    </span>    <span class="tooltiptext undead_glow">        Sesílatel získá možnost vnímat vše, co vnímá jím zvolený nemrtvý, kterého má pod svou kontrolou.  Týká se všech smyslů, včetně magických.    </span></span>'}],"leptavy jed":[{tags:["jed"],html:'<span data-html="true" class="tooltip " data-tags="jed">    <span class="spell_text" tabindex="0">        Leptavý Jed    </span>    <span class="spell_icons">        <span class="icon-tooltip">    ☠️    <span class="icon-tooltip-text">        Jed    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel sešle zvolené jedové kouzlo, přičemž jeho magický jed získává leptavé vlastnosti.  Leptavý jed se vstřebává i skrze kůži či sliznice, při nadýchání ulpívá v plicích a obtížně se ho zbavuje. I malá expozice tak může mít drastické následky.    </span></span>'}],"zastava srdce":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Zástava Srdce    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel cíli způsobí zástavu srdce. Pokud cíl nemá více srdcí, smrt nastává téměř okamžitě.    </span></span>'}],"hromadna paralyza":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Hromadná Paralýza    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel po dobu trvání kouzla uvede několik cílových bytostí do nehybného stavu tím, že jim okamžitě přestanou fungovat všechny svaly kromě dýchacích. Doba trvání a počet možných cílů závisí na schopnostech sesílatele. Energetická náročnost znatelně roste s celkovou velikostí cílových bytostí.    </span></span>'}],"hromadne vysati energie":[{tags:["vysati"],html:'<span data-html="true" class="tooltip " data-tags="vysátí">    <span class="spell_text" tabindex="0">        Hromadné Vysátí Energie    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧛🏻‍♀️    <span class="icon-tooltip-text">        Vysátí    </span></span>    </span>    <span class="tooltiptext death_glow">        Sesílatel získává možnost svým libovolným vysávajícím kouzlem vysávat životní sílu více cílů najednou.  Rychlost vysávání závisí na schopnostech sesílatele. Ačkoliv doplňuje energii velmi rychle, je snadné způsobit si řadu vedlejších účinků z nadbytku životní energie. Při vysávání života se aplikují stejná rizika, jako při kouzlu <strong>Vysátí života</strong>.    </span></span>'}],"dlouhodoba tma":[{tags:["dohled"],html:'<span data-html="true" class="tooltip " data-tags="dohled">    <span class="spell_text" tabindex="0">        Dlouhodobá Tma    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel vytvoří v cílové oblasti magickou tmu, která, za cenu velkého množství energie, zůstane na cílovém místě po dobu nejméně několika dní. V magické tmě nikdo nic neuvidí. Běžné zdroje světla (louče, lampy, slunce...) magickou tmu neprosvítí, při kontaktu s magickým světlem vítězí kouzlo schopnějšího mága, ovšem i schopnější mág života musí vynaložit na prosvícení dlouhodobé tmy stejné množství energie, jak do tmy bylo vloženo na celou dobu jejího trvání.    </span></span>'}],"ohniva strela":[{tags:["projektil","ohen"],html:'<span data-html="true" class="tooltip " data-tags="projektil,oheň">    <span class="spell_text" tabindex="0">        Ohnivá Střela    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🏹    <span class="icon-tooltip-text">        Projektil    </span></span> <span class="icon-tooltip">    🔥    <span class="icon-tooltip-text">        Oheň    </span></span>    </span>    <span class="tooltiptext fire_glow">        Sesílatel vyšle k cíli střelu z hořícího plynu zhruba velikosti pěsti.    </span></span>'}],"ohniva stena":[{tags:["dohled","ohen"],html:'<span data-html="true" class="tooltip " data-tags="dohled,oheň">    <span class="spell_text" tabindex="0">        Ohnivá Stěna    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🔥    <span class="icon-tooltip-text">        Oheň    </span></span>    </span>    <span class="tooltiptext fire_glow">        Sesílatel v cílovém místě vytvoří stěnu z plamenů. <br><br>Šíře i výška stěny závisí na schopnostech sesílatele, standardně zhruba 2m šířka a 1,5m výška.    </span></span>'}],"ohnivy plast":[{tags:["sesilatel","ohen"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,oheň">    <span class="spell_text" tabindex="0">        Ohnivý Plášť    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🔥    <span class="icon-tooltip-text">        Oheň    </span></span>    </span>    <span class="tooltiptext fire_glow">        Sesílatel se zahalí do pláště z rotujících plamenů, které popálí kohokoliv, kdo se k sesílateli přiblíží.<br><br>Standardní poloměr 1,5m.    </span></span>'}],"ohnivy prstenec":[{tags:["ohen"],html:'<span data-html="true" class="tooltip " data-tags="oheň">    <span class="spell_text" tabindex="0">        Ohnivý Prstenec    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🔥    <span class="icon-tooltip-text">        Oheň    </span></span>    </span>    <span class="tooltiptext fire_glow">        Sesílatel vyšle do všech směrů od sebe prstenec plamenů. <br><br>Výška, do které plameny vystoupají od země, je standardně 1,5m, poloměr prstence závisí na schopnostech sesílate icon-tooltip-text">        Sugesce    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel vnutí cíli pocit akutního strachu z nebezpečí. <br><br>Různé cíle mohou na strach reagovat různě.    </span></span>'}],"sugesce klidu":[{tags:["dohled","sugesce"],html:'<span data-html="true" class="tooltip " data-tags="dohled,sugesce">    <span class="spell_text" tabindex="0">        Sugesce Klidu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    💡    <span class="icon-tooltip-text">        Sugesce    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel vnutí cíli pocit bezpečí a klidu. <br><br>Mírní vášně, pokud nejsou příliš silné.    </span></span>'}],"cteni soucasne myslenky":[{tags:["dohled","mentalni magie"],html:'<span data-html="true" class="tooltip " data-tags="dohled,mentální magie">    <span class="spell_text" tabindex="0">        Čtení Současné Myšlenky    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧠    <span class="icon-tooltip-text">        Mentální Magie    </span></span>    </span>    <span class="tooltiptext mental_glow">        Na krátkou dobu umožní sesílateli znát současné myšlenky cíle. <br><br>Pokud cíl a sesílatel přemýšlí hodně odlišně, může být pro sesílatele náročné tyto myšlenky interpretovat.    </span></span>'}],"mentalni utok":[{tags:["dohled","mentalni magie"],html:'<span data-html="true" class="tooltip " data-tags="dohled,mentální magie">    <span class="spell_text" tabindex="0">        Mentální Útok    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧠    <span class="icon-tooltip-text">        Mentální Magie    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel současně působí na cíl několika výraznými smyslovými vjemy působícími na všechny smysly. <br><br>Způsobuje dezorientaci, zkušený mág může silným útokem způsobit cíli mdloby.    </span></span>'}],"hypnoza - spanek":[{tags:["hypnoza"],html:'<span data-html="true" class="tooltip " data-tags="hypnóza">    <span class="spell_text" tabindex="0">        Hypnóza - Spánek    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧿    <span class="icon-tooltip-text">        Hypnóza    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel udržující s cílem nepřerušený oční kontakt může ovlivnit stav vědomí cíle a využít toho k jeho uspání. <br><br>Rychlost zhypnotizování a délka efektu závisí na schopnostech sesílatele.    </span></span>'}],"telekineze - predmet":[{tags:["dohled","soustredeni","telekineze"],html:'<span data-html="true" class="tooltip " data-tags="dohled,soustředění,telekineze">    <span class="spell_text" tabindex="0">        Telekineze - Předmět    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span> <span class="icon-tooltip">    🎈    <span class="icon-tooltip-text">        Telekineze    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Umožňuje sesílateli pomalu a plynule pohybovat cílovým předmětem. <br><br>Pohybování většími objekty je energeticky náročnější. Vyžaduje sesílatelovu plnou pozornost.    </span></span>'}],"hromadna telekineze - predmety":[{tags:["dohled","soustredeni","telekineze"],html:'<span data-html="true" class="tooltip " data-tags="dohled,soustředění,telekineze">    <span class="spell_text" tabindex="0">        Hromadná Telekineze - Předměty    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧘    <span class="icon-tooltip-text">        Soustředění    </span></span> <span class="icon-tooltip">    🎈    <span class="icon-tooltip-text">        Telekineze    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatelova <strong>Telekineze - předmět</strong> může pomalu a plynule hýbat několika předměty najednou. <br><br>Počet předmětů a celková váha, se kterými dokáže sesílatel pohybovat, je závislá na schopnostech sesílatele. Vyžaduje sesílatelovu plnou pozornost.    </span></span>'}],"mentalni obrana - sugesce a iluze":[{tags:["dohled","mentalni obrana"],html:'<span data-html="true" class="tooltip " data-tags="dohled,mentální obrana">    <span class="spell_text" tabindex="0">        Mentální Obrana - Sugesce A Iluze    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🛡️    <span class="icon-tooltip-text">        Mentální Obrana    </span></span>    </span>    <span class="tooltiptext neutral_glow">        Sesílatel sobě nebo cíli obrní smysly proti kouzlům sugescí a iluzí.    </span></span>'}],neviditelnost:[{tags:["sesilatel","iluze"],html:'<span data-html="true" class="tooltip " data-tags="sesílatel,iluze">    <span class="spell_text" tabindex="0">        Neviditelnost    </span>    <span class="spell_icons">        <span class="icon-tooltip">    🧙‍♂️    <span class="icon-tooltip-text">        Sesílatel    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Iluze    </span></span>    </span>    <span class="tooltiptext illusion_glow">        Sesílatel všechny cíle v okolí ošálí iluzí, která neguje obrazové vjemy související se sesílatelem. Cíle tak sesílatele neuvidí. <br><br>Sesílatel si musí být cíle vědom, aby ten byl ovlivněn.    </span></span>'}],"velka zrakova iluze":[{tags:["dohled","iluze"],html:'<span data-html="true" class="tooltip " data-tags="dohled,iluze">    <span class="spell_text" tabindex="0">        Velká Zraková Iluze    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Iluze    </span></span>    </span>    <span class="tooltiptext illusion_glow">        Sesílatel ošálí cíl iluzí, která způsobí, že cíl vidí sesílatelem zvolený obraz. <br><br>Sesílatel může po dobu trvání kouzla vjemy měnit, včetně hýbání daným obrazem. <br><br>Obraz může mít zhruba velikost domu.    </span></span>'}],"iluze hmatoveho vjemu":[{tags:["dohled","iluze"],html:'<span data-html="true" class="tooltip " data-tags="dohled,iluze">    <span class="spell_text" tabindex="0">        Iluze Hmatového Vjemu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🌀    <span class="icon-tooltip-text">        Iluze    </span></span>    </span>    <span class="tooltiptext illusion_glow">        Sesílatel ošálí cíl iluzí, která způsobí, že cíl cítí sesílatelem zvolený hmatový vjem. <br><br>Sesílatel může po dobu trvání kouzla vjemy měnit.    </span></span>'}],"sugesce nazoru":[{tags:["dohled","sugesce"],html:'<span data-html="true" class="tooltip " data-tags="dohled,sugesce">    <span class="spell_text" tabindex="0">        Sugesce Názoru    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    💡    <span class="icon-tooltip-text">        Sugesce    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel vnukne cíli shluk myšlenek tvořících nějaký názor. <br><br>Pokud je většina myšlenek v rozporu s přesvědčením nebo přirozeností cíle, cíl je po krátké době zavrhne.    </span></span>'}],"sugesce vzteku":[{tags:["dohled","sugesce"],html:'<span data-html="true" class="tooltip " data-tags="dohled,sugesce">    <span class="spell_text" tabindex="0">        Sugesce Vzteku    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    💡    <span class="icon-tooltip-text">        Sugesce    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel způsobí cíli vnitřní výbuch hněvu.    </span></span>'}],"sugesce pratelstvi":[{tags:["dohled","sugesce"],html:'<span data-html="true" class="tooltip " data-tags="dohled,sugesce">    <span class="spell_text" tabindex="0">        Sugesce Přátelství    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    💡    <span class="icon-tooltip-text">        Sugesce    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel vnutí cíli přátelské sympatie k osobě, se kterou cíl zrovna interaguje.    </span></span>'}],"sugesce odporu":[{tags:["dohled","sugesce"],html:'<span data-html="true" class="tooltip " data-tags="dohled,sugesce">    <span class="spell_text" tabindex="0">        Sugesce Odporu    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    💡    <span class="icon-tooltip-text">        Sugesce    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel vnutí cíli pocit zhnusení a antipatie k cíli, se kterým cíl zrovna interaguje.     </span></span>'}],zmateni:[{tags:["dohled","mentalni magie"],html:'<span data-html="true" class="tooltip " data-tags="dohled,mentální magie">    <span class="spell_text" tabindex="0">        Zmatení    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧠    <span class="icon-tooltip-text">        Mentální Magie    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel donutí cíl zapomenout současnou myšlenku a kontext situace, což vede ke zmatení a dezorientaci cíle.    </span></span>'}],"cteni nedavne myslenky":[{tags:["dohled","mentalni magie"],html:'<span data-html="true" class="tooltip " data-tags="dohled,mentální magie">    <span class="spell_text" tabindex="0">        Čtení Nedávné Myšlenky    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧠    <span class="icon-tooltip-text">        Mentální Magie    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel po dobu trvání kouzla může číst myšlenky, které cíli nedávno proběhly hlavou. <br><br>Čím větší dojem myšlenka zanechala, tím lépe se hledá. <br><br>Pokud cíl a sesílatel přemýšlí hodně odlišně, může být pro sesílatele náročné tyto myšlenky interpretovat.    </span></span>'}],"vypadek pameti":[{tags:["dohled","mentalni magie"],html:'<span data-html="true" class="tooltip " data-tags="dohled,mentální magie">    <span class="spell_text" tabindex="0">        Výpadek Paměti    </span>    <span class="spell_icons">        <span class="icon-tooltip">    👁️    <span class="icon-tooltip-text">        Dohled    </span></span> <span class="icon-tooltip">    🧠    <span class="icon-tooltip-text">        Mentální Magie    </span></span>    </span>    <span class="tooltiptext mental_glow">        Sesílatel cíli přeruší asociace s nějakou vzpomínkou, čímž cíli učiní vybavení si této vzpomínky výrazně těžším. <
