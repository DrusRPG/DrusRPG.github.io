<script>
    const SPELL_SHOW_CHANCE = 0.001;
    let allSpellsRevealed = false;

    // Mwahahahahaha
    function updateSpellVisibility() {
        if (allSpellsRevealed) return;

        const elements = document.getElementsByClassName('secret_spell');
        let visible_count = 0;

        for (let el of elements) {
            if (Math.random() < SPELL_SHOW_CHANCE) {
                el.parentNode.style.display = 'list-item';
                visible_count++;
            } else {
                el.parentNode.style.display = 'none';
            }
        }

        for (let el of document.getElementsByClassName("secret_header")) {
            el.style.display = visible_count > 0 ? 'block' : 'none';
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        updateSpellVisibility();
        setInterval(updateSpellVisibility, 10000);
    });

    function applySpellFilters(bar) {
        const fullSet = bar.dataset.filters.split(",");
        const active = new Set(
            Array.from(bar.querySelectorAll(".filter-btn.active")).map((b) => b.dataset.filter)
        );
        document.querySelectorAll(".tooltip[data-tags]").forEach((spell) => {
            const tags = spell.dataset.tags.split(",").filter(Boolean);
            const relevant = tags.filter((t) => fullSet.includes(t));
            const visible =
                relevant.length === 0 ? active.size === fullSet.length : relevant.some((t) => active.has(t));
            spell.closest("li").classList.toggle("filter-hidden", !visible);
        });
    }

    document.querySelectorAll(".spell-filter-bar").forEach((bar) => {
        const buttons = Array.from(bar.querySelectorAll(".filter-btn"));
        buttons.forEach((btn) => {
            btn.addEventListener("click", () => {
                const allActive = buttons.every((b) => b.classList.contains("active"));
                if (allActive) {
                    buttons.forEach((b) => b.classList.toggle("active", b === btn));
                } else {
                    btn.classList.toggle("active");
                    if (!buttons.some((b) => b.classList.contains("active"))) {
                        buttons.forEach((b) => b.classList.add("active"));
                    }
                }
                applySpellFilters(bar);
            });
        });
    });

    const images = document.getElementsByClassName('entry-cover')[0];
    if (images) {
        const image = images.childNodes[0];
        let clickCount = 0;
        image.addEventListener('click', () => {
            clickCount++;
            if (clickCount === 10) {
                runSpecialCode();
            }
        });
    }

    function runSpecialCode() {
        allSpellsRevealed = true;
        for (let el of document.getElementsByClassName('secret_spell')) {
            el.parentNode.style.display = 'list-item';
        }
        for (let el of document.getElementsByClassName("secret_header")) {
            el.style.display = 'block';
        }
        for (let el of document.getElementsByClassName('skill-node-secret')) {
            el.style.display = 'flex';
        }
        for (let el of document.getElementsByClassName('skill-arrow-secret')) {
            el.style.display = 'inline';
        }
    }
</script>
